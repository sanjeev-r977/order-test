<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Watcher</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f1115;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1b1f27;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 42px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
      background: #2b303b;
      color: white;
    }

    button {
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
      background: #4f8cff;
      color: white;
    }

    button:hover {
      background: #3b74db;
    }

    #count {
      font-size: 72px;
      margin: 25px 0 10px;
      font-weight: bold;
    }

    #status {
      color: #b0b0b0;
      font-size: 14px;
      margin-top: 10px;
    }

    .small {
      margin-top: 20px;
      color: #888;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Order Watcher</h1>

    <input
      type="text"
      id="urlInput"
      value="https://sanjeev-r977.github.io/order-test/orders.json"
    />

    <div>
      <button onclick="startWatching()">Go</button>
      <button onclick="enableSound()">Enable Sound</button>
    </div>

    <div id="count">-</div>
    <div id="status">Waiting...</div>

    <div class="small">
      JSON file should look like:
      <br>
      { "newOrders": 3 }
    </div>
  </div>

  <script>
    let lastCount = null;
    let watchUrl = "";
    let pollTimer = null;
    let soundEnabled = false;

    function enableSound() {
      soundEnabled = true;

      const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
      audio.play().catch(() => {});

      document.getElementById("status").textContent = "Sound enabled";
    }

    async function fetchOrderCount() {
      if (!watchUrl) return;

      try {
        const response = await fetch(
          watchUrl + "?t=" + Date.now(),
          { cache: "no-store" }
        );

        const data = await response.json();
        const currentCount = parseInt(data.newOrders, 10);

        if (isNaN(currentCount)) {
          document.getElementById("status").textContent =
            "Could not read newOrders from JSON";
          return;
        }

        document.getElementById("count").textContent = currentCount;
        document.getElementById("status").textContent =
          "Checked at " + new Date().toLocaleTimeString();

        if (
          lastCount !== null &&
          currentCount > lastCount &&
          soundEnabled
        ) {
          const audio = new Audio(
            "https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"
          );
          audio.play().catch(() => {});
        }

        lastCount = currentCount;
      } catch (err) {
        document.getElementById("status").textContent =
          "Error: " + err.message;
      }
    }

    function startWatching() {
      watchUrl = document.getElementById("urlInput").value.trim();

      if (!watchUrl) {
        alert("Enter a URL first");
        return;
      }

      if (pollTimer) {
        clearInterval(pollTimer);
      }

      lastCount = null;

      fetchOrderCount();

      pollTimer = setInterval(fetchOrderCount, 10000);

      document.getElementById("status").textContent =
        "Watching every 10 seconds...";
    }
  </script>

</body>
</html>
